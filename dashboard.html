<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RESPACE — 데이터 통합 대시보드</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Pretendard', 'Noto Sans KR', -apple-system, sans-serif;
      background: #0a0a0a;
      color: #111;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: #0a0a0a;
      color: #fff;
      padding: 0.9rem 2rem;
      display: flex;
      align-items: center;
      gap: 1.2rem;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .back-btn {
      color: rgba(255,255,255,.45);
      text-decoration: none;
      font-size: 0.82rem;
      display: flex; align-items: center; gap: .35rem;
      transition: color .15s;
      white-space: nowrap;
    }
    .back-btn:hover { color: #fff; }
    .header-divider { color: rgba(255,255,255,.2); }
    .logo {
      font-weight: 800;
      font-size: 0.92rem;
      letter-spacing: 0.18em;
      border: 1.5px solid #fff;
      padding: 0.28rem 0.65rem;
      white-space: nowrap;
    }
    .header-sub { font-size: 0.83rem; color: rgba(255,255,255,.55); white-space: nowrap; }
    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .live-badge {
      font-size: 0.72rem;
      font-weight: 700;
      color: #a29bfe;
      background: rgba(108,92,231,.2);
      padding: .28rem .75rem;
      border-radius: 20px;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .open-btn {
      font-size: 0.78rem;
      color: rgba(255,255,255,.4);
      text-decoration: none;
      border: 1px solid rgba(255,255,255,.15);
      padding: .28rem .75rem;
      border-radius: 6px;
      transition: all .15s;
      white-space: nowrap;
    }
    .open-btn:hover {
      color: #fff;
      border-color: rgba(255,255,255,.4);
    }
    .system-badge {
      font-size: 0.7rem;
      color: rgba(255,255,255,.25);
      letter-spacing: 0.1em;
      white-space: nowrap;
    }

    /* ── iframe wrapper ── */
    .iframe-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #fff;
    }

    /* ── Loading overlay ── */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: #f5f5f3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      color: #999;
      font-size: .88rem;
      transition: opacity .4s;
    }
    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #e5e5e5;
      border-top-color: #6c5ce7;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      header { padding: .8rem 1rem; gap: .7rem; }
      .system-badge, .open-btn { display: none; }
    }
  </style>
</head>
<body>

<header>
  <a href="/" class="back-btn">← 홈</a>
  <span class="header-divider">|</span>
  <div class="logo">RESPACE</div>
  <div class="header-sub">데이터 통합 대시보드</div>
  <div class="header-right">
    <span class="live-badge">● Live</span>
    <a href="https://gloup-rachel.github.io/reports/respace_dashboard_v3.html"
       target="_blank" class="open-btn">새 탭으로 열기 ↗</a>
    <span class="system-badge">SYSTEM 03</span>
  </div>
</header>

<div class="iframe-wrap">
  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <span>대시보드 로딩 중...</span>
  </div>
  <iframe
    src="https://gloup-rachel.github.io/reports/respace_dashboard_v3.html"
    id="dashboard-frame"
    title="RESPACE 데이터 통합 대시보드"
    onload="document.getElementById('loading').classList.add('hidden')"
  ></iframe>
</div>

</body>
</html>
